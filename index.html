<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio Start - Editor Mode</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Oswald:wght@500;700&display=swap" rel="stylesheet">

    <style>
        /* BASE STYLES */
        body {
            background-color: #1a1a1a; /* Dark background like Photoshop */
            margin: 0;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            color: #ccc;
        }

        /* --- EDITOR UI --- */
        .editor-navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 32px;
            background-color: #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
            font-size: 12px;
            z-index: 100;
            border-bottom: 1px solid #111;
        }

        .nav-left { display: flex; align-items: center; gap: 15px; }
        .logo {
            background-color: #31a8ff;
            color: #001e36;
            font-weight: bold;
            padding: 2px 4px;
            border-radius: 2px;
            font-size: 10px;
        }
        .nav-left button, .nav-right button {
            background: none;
            border: none;
            padding: 0;
            color: #aaa;
            font-family: inherit;
            font-size: inherit;
            cursor: pointer;
            transition: color 0.3s;
        }
        .nav-left button:hover, .nav-right button:hover { color: #fff; }
        .nav-left button:focus-visible, .nav-right button:focus-visible {
            outline: 2px solid #31a8ff;
            outline-offset: 2px;
        }
        .nav-export { animation: exportHighlight 10s infinite linear; }
        @keyframes exportHighlight {
            0%, 95% { color: #aaa; font-weight: 400; }
            96%, 100% { color: #fff; font-weight: 600; }
        }
        .nav-right { color: #888; padding-right: 20px; }

        .side-tools {
            position: fixed;
            left: 0;
            top: 32px;
            bottom: 24px;
            width: 36px;
            background-color: #333;
            border-right: 1px solid #111;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 10px;
            gap: 12px;
            z-index: 90;
        }
        .tool {
            background: none;
            border: none;
            padding: 0;
            color: #888;
            font-size: 14px;
            cursor: pointer;
        }
        .tool.active { color: #31a8ff; }
        .tool:focus-visible {
            outline: 2px solid #31a8ff;
            outline-offset: 2px;
        }

        .bottom-status {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 24px;
            background-color: #333;
            display: flex;
            align-items: center;
            padding: 0 10px;
            font-size: 11px;
            z-index: 100;
            border-top: 1px solid #111;
        }
        .zoom-level { border-right: 1px solid #444; padding: 0 10px; }
        .doc-info { padding: 0 10px; flex-grow: 1; color: #888; }
        .progress-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #222;
            padding: 0 15px;
            height: 100%;
            min-width: 180px;
        }
        .progress-label { font-size: 10px; color: #aaa; }
        .progress-percentage { color: #31a8ff; font-weight: bold; width: 40px; text-align: right; }

        /* --- ANIMATION HELPERS --- */
        .mouse-cursor {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
            pointer-events: none;
            animation: cursorMovement 10s infinite linear;
        }

        .selection-box {
            position: fixed;
            border: 1px solid #31a8ff;
            z-index: 999;
            pointer-events: none;
            opacity: 0;
            animation: selectionMovement 10s infinite linear;
        }
        .handle {
            position: absolute;
            width: 5px;
            height: 5px;
            background: #fff;
            border: 1px solid #31a8ff;
        }
        .tl { top: -3px; left: -3px; }
        .tr { top: -3px; right: -3px; }
        .bl { bottom: -3px; left: -3px; }
        .br { bottom: -3px; right: -3px; }

        /* PENGATURAN CARD */
        .card {
            background-color: #ffffff;
            width: 90vw;
            height: 65vh;
            max-width: 420px;
            max-height: 800px;
            border-radius: 35px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* --- ELEMENTS INITIAL STATE --- */
        .rope-left, .rope-right, .subtitle-top, .title-main, .divider-container, .subtitle-bottom, .outline-text-container, .bottom-bg, .person-image {
            opacity: 0;
            animation-duration: 10s;
            animation-iteration-count: infinite;
            animation-fill-mode: forwards;
            animation-timing-function: cubic-bezier(0.45, 0.05, 0.55, 0.95);
        }

        /* --- ANIMATIONS SEQUENCE --- */

        /* 1. Background */
        .bottom-bg { animation-name: bgAnim; }
        @keyframes bgAnim {
            0%, 5% { opacity: 0; transform: translateY(100px); }
            10%, 100% { opacity: 1; transform: translateY(0); }
        }

        /* 2. Person */
        .person-image { animation-name: personAnim; }
        @keyframes personAnim {
            0%, 15% { opacity: 0; transform: translateX(100px) scale(1.3); }
            25%, 100% { opacity: 1; transform: translateX(0) scale(1.3); }
        }

        /* 3. Title */
        .title-main { animation-name: titleAnim; }
        @keyframes titleAnim {
            0%, 30% { opacity: 0; transform: translateY(-50px); }
            40%, 100% { opacity: 1; transform: translateY(0); }
        }

        /* 4. Subtitle Top */
        .subtitle-top { animation-name: subTopAnim; }
        @keyframes subTopAnim {
            0%, 45% { opacity: 0; transform: translateX(-30px); }
            55%, 100% { opacity: 1; transform: translateX(0); }
        }

        /* 5. Subtitle Bottom */
        .subtitle-bottom { animation-name: subBottomAnim; }
        @keyframes subBottomAnim {
            0%, 55% { opacity: 0; transform: translateX(30px); }
            65%, 100% { opacity: 1; transform: translateX(0); }
        }

        /* 6. Divider */
        .divider-container { animation-name: dividerAnim; }
        @keyframes dividerAnim {
            0%, 65% { opacity: 0; transform: scaleX(0); }
            75%, 100% { opacity: 1; transform: scaleX(1); }
        }
        .line-inner {
            animation: loadingBar 10s infinite linear;
        }
        @keyframes loadingBar {
            0%, 75% { width: 0%; }
            85%, 100% { width: 100%; }
        }

        /* 7. Outline Text */
        .outline-text-container { animation-name: outlineAnim; }
        @keyframes outlineAnim {
            0%, 85% { opacity: 0; transform: scale(1.5); }
            92%, 100% { opacity: 1; transform: scale(1.3); }
        }

        /* 8. Ropes */
        .rope-left { animation-name: ropeLAnim; }
        @keyframes ropeLAnim {
            0%, 92% { opacity: 0; transform: translate(-100%, -100%) scaleX(-1); }
            98%, 100% { opacity: 1; transform: translate(-40%, -40%) scaleX(-1); }
        }
        .rope-right { animation-name: ropeRAnim; }
        @keyframes ropeRAnim {
            0%, 92% { opacity: 0; transform: translate(100%, -100%); }
            98%, 100% { opacity: 1; transform: translate(40%, -40%); }
        }

        /* --- CURSOR & SELECTION BOX --- */
        @keyframes cursorMovement {
            0% { transform: translate(90vw, 90vh); }
            5% { transform: translate(50vw, 75vh); } /* To BG */
            10% { transform: translate(50vw, 65vh); } /* Drag BG */
            15% { transform: translate(70vw, 70vh); } /* To Person */
            25% { transform: translate(50vw, 70vh); } /* Drag Person */
            30% { transform: translate(50vw, 35vh); } /* To Title */
            40% { transform: translate(50vw, 30vh); } /* Drag Title */
            45% { transform: translate(40vw, 25vh); } /* To SubTop */
            55% { transform: translate(50vw, 25vh); } /* Drag SubTop */
            60% { transform: translate(60vw, 40vh); } /* To SubBottom */
            65% { transform: translate(50vw, 40vh); } /* Drag SubBottom */
            85% { transform: translate(50vw, 60vh); } /* To Outline */
            92% { transform: translate(50vw, 55vh); } /* Drag Outline */
            100% { transform: translate(95vw, 40px); } /* Exit to Export */
        }

        @keyframes selectionMovement {
            0%, 4.9% { opacity: 0; }
            /* BG */
            5% { opacity: 1; width: 380px; height: 120px; transform: translate(calc(50vw - 190px), calc(50vh + 80px)); }
            10% { opacity: 1; width: 380px; height: 120px; transform: translate(calc(50vw - 190px), calc(50vh + 130px)); }
            10.1% { opacity: 0; }
            /* Person */
            15% { opacity: 1; width: 180px; height: 380px; transform: translate(calc(50vw + 40px), calc(50vh + 40px)); }
            25% { opacity: 1; width: 180px; height: 380px; transform: translate(calc(50vw - 90px), calc(50vh + 40px)); }
            25.1% { opacity: 0; }
            /* Title */
            30% { opacity: 1; width: 320px; height: 80px; transform: translate(calc(50vw - 160px), calc(50vh - 230px)); }
            40% { opacity: 1; width: 320px; height: 80px; transform: translate(calc(50vw - 160px), calc(50vh - 190px)); }
            40.1% { opacity: 0; }
            /* Subtitle Top */
            45% { opacity: 1; width: 200px; height: 30px; transform: translate(calc(50vw - 150px), calc(50vh - 270px)); }
            55% { opacity: 1; width: 200px; height: 30px; transform: translate(calc(50vw - 100px), calc(50vh - 270px)); }
            55.1% { opacity: 0; }
            /* Subtitle Bottom */
            60% { opacity: 1; width: 250px; height: 30px; transform: translate(calc(50vw + 20px), calc(50vh - 110px)); }
            65% { opacity: 1; width: 250px; height: 30px; transform: translate(calc(50vw - 125px), calc(50vh - 110px)); }
            65.1% { opacity: 0; }
            /* Outline Text */
            85% { opacity: 1; width: 400px; height: 300px; transform: translate(calc(50vw - 200px), calc(50vh - 100px)); }
            92% { opacity: 1; width: 400px; height: 300px; transform: translate(calc(50vw - 200px), calc(50vh - 150px)); }
            92.1% { opacity: 0; }
            100% { opacity: 0; }
        }

        /* Progress Counter */
        .progress-percentage::after {
            content: "0%";
            animation: counterAnim 10s infinite linear;
        }
        @keyframes counterAnim {
            0% { content: "0%"; }
            10% { content: "15%"; }
            25% { content: "32%"; }
            40% { content: "48%"; }
            55% { content: "61%"; }
            65% { content: "75%"; }
            75% { content: "88%"; }
            85% { content: "95%"; }
            100% { content: "100%"; }
        }

        /* --- INTERNAL CARD ELEMENTS --- */
        .rope-left, .rope-right {
            position: absolute;
            width: 50%;
            max-width: 250px;
            z-index: 10;
        }

        .header-section {
            text-align: center;
            margin-top: 15%;
            padding: 0 20px;
            z-index: 5;
            width: 100%;
            box-sizing: border-box;
        }

        .subtitle-top {
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            font-size: clamp(10px, 3vw, 12px);
            letter-spacing: 2px;
            color: #111;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .title-main {
            font-family: 'Oswald', sans-serif;
            font-size: clamp(40px, 12vw, 65px);
            font-weight: 700;
            line-height: 1.1;
            margin: 0;
            color: #000;
            transform: scaleY(1.15);
        }

        .divider-container {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 15px 0;
            width: 100%;
            padding: 0 5%;
            box-sizing: border-box;
        }

        .line-wrapper {
            flex-grow: 1;
            height: 2px;
            display: flex;
        }
        .line-wrapper.left { justify-content: flex-end; }
        .line-wrapper.right { justify-content: flex-start; }

        .line-inner {
            height: 100%;
            background-color: #000;
            width: 0;
        }

        .divider-text {
            font-family: 'Oswald', sans-serif;
            margin: 0 15px;
            font-weight: 700;
            font-size: clamp(14px, 4vw, 18px);
            letter-spacing: 2px;
            color: #000;
        }

        .subtitle-bottom {
            font-family: 'Montserrat', sans-serif;
            font-weight: 400;
            font-size: clamp(9px, 2.5vw, 12px);
            color: #888;
            margin-top: 5px;
        }

        .visual-section {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 55%;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            pointer-events: none;
        }

        .outline-text-container {
            position: absolute;
            top: 0;
            width: 100%;
            text-align: center;
            z-index: 1;
        }

        .outline-text {
            font-family: 'Oswald', sans-serif;
            font-weight: 500;
            font-size: clamp(60px, 20vw, 130px);
            color: transparent;
            -webkit-text-stroke: 1px #d4d4d4;
            margin: 0;
            line-height: 0.9;
            letter-spacing: 2px;
        }

        .bottom-bg {
            position: absolute;
            bottom: 0;
            width: 90%;
            height: 30%;
            object-fit: cover;
            border-radius: 25px 25px 0 0;
            z-index: 2;
        }

        .person-image {
            position: absolute;
            bottom: -1vh;
            height: 100%;
            object-fit: contain;
            z-index: 3;
            text-shadow: 5px black;
        }

    </style>
</head>
<body>

    <!-- Editor UI elements -->
    <div class="editor-navbar">
        <div class="nav-left">
            <div class="logo" aria-label="Ps logo">Ps</div>
            <button>File</button>
            <button>Edit</button>
            <button>Image</button>
            <button>Layer</button>
            <button>Type</button>
            <button>Select</button>
            <button>Filter</button>
            <button>View</button>
            <button>Window</button>
            <button class="nav-export">Export</button>
        </div>
        <div class="nav-right">
            <button>Portfolio_Final_2024.psd @ 66.7% (RGB/8)</button>
        </div>
    </div>

    <div class="side-tools">
        <button class="tool active" aria-label="Tool ■">■</button>
        <button class="tool" aria-label="Tool V">V</button>
        <button class="tool" aria-label="Tool L">L</button>
        <button class="tool" aria-label="Tool W">W</button>
        <button class="tool" aria-label="Tool C">C</button>
        <button class="tool" aria-label="Tool I">I</button>
        <button class="tool" aria-label="Tool J">J</button>
        <button class="tool" aria-label="Tool B">B</button>
        <button class="tool" aria-label="Tool S">S</button>
        <button class="tool" aria-label="Tool Y">Y</button>
        <button class="tool" aria-label="Tool E">E</button>
        <button class="tool" aria-label="Tool G">G</button>
    </div>

    <div class="bottom-status">
        <div class="zoom-level">66.67%</div>
        <div class="doc-info">Doc: 1.2M / 4.5M</div>
        <div class="progress-wrapper">
            <div class="progress-label">Exporting...</div>
            <div class="progress-percentage"></div>
        </div>
    </div>

    <!-- Animation Helpers -->
    <div class="selection-box">
        <div class="handle tl"></div>
        <div class="handle tr"></div>
        <div class="handle bl"></div>
        <div class="handle br"></div>
    </div>
    <div class="mouse-cursor">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 2L17 10L11 11L10 17L4 2Z" fill="white" stroke="black" stroke-width="2" stroke-linejoin="round"/>
        </svg>
    </div>

    <div class="card">
        <img src="tali.png" alt="Tali Kiri" class="rope-left">
        <img src="tali.png" alt="Tali Kanan" class="rope-right">

        <div class="header-section">
            <div class="subtitle-top">GREAT PLACE TO SHOW OFF</div>
            <h1 class="title-main">PORTOFOLIO</h1>

            <div class="divider-container">
                <div class="line-wrapper left"><div class="line-inner"></div></div>
                <div class="divider-text">START</div>
                <div class="line-wrapper right"><div class="line-inner"></div></div>
            </div>

            <div class="subtitle-bottom">Amazing Gradient From Our Solar System</div>
        </div>

        <div class="visual-section">
            <div class="outline-text-container">
                <p class="outline-text">PORTO</p>
                <p class="outline-text">FOLIO</p>
            </div>

            <img src="background.png" alt="Background" class="bottom-bg">
            <img src="orang.png" alt="Gambar Orang" class="person-image">
        </div>
    </div>

</body>
</html>
