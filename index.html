<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio - New Design</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Oswald:wght@500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --card-width: 315px; /* 420 * 0.75 */
            --card-height: 600px; /* Adjusted height */
            --bg-color: #0a0a0a;
            --grid-color: rgba(255, 255, 255, 0.25);
        }

        body {
            background-color: var(--bg-color);
            margin: 0;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            perspective: 1000px;
        }

        /* Background Elements */
        .bg-container {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            background: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%);
        }

        .rect-moving {
            position: absolute;
            top: 20%;
            width: 300px;
            height: 60px;
            background: white;
            display: flex;
            align-items: center;
            white-space: nowrap;
            overflow: hidden;
            transform: rotate(-5deg);
            animation: moveRL 15s linear infinite;
            z-index: 1;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        @keyframes moveRL {
            from { right: -400px; }
            to { right: 110%; }
        }

        .crossed-container {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
        }

        .box-3d {
            position: absolute;
            width: 100vw;
            height: 80px;
            background: white;
            display: flex;
            align-items: center;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            border-top: 2px solid #333;
            border-bottom: 2px solid #333;
        }

        .box-1 {
            transform: rotateY(20deg) rotateZ(15deg) translateZ(-100px);
        }

        .box-2 {
            transform: rotateY(-20deg) rotateZ(-15deg) translateZ(-150px);
        }

        .scrolling-text {
            font-family: 'Oswald', sans-serif;
            font-size: 40px;
            font-weight: 700;
            color: #000;
            display: flex;
            white-space: nowrap;
            animation: scrollText 10s linear infinite;
        }

        .scrolling-text span {
            padding-right: 50px;
        }

        .scrolling-text.fast {
            animation-duration: 7s;
        }

        @keyframes scrollText {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* THE CARD & GRID SHADOW */
        .card-wrapper {
            position: relative;
            z-index: 10;
        }

        .grid-shadow {
            position: absolute;
            top: -150px;
            left: -150px;
            right: -150px;
            bottom: -150px;
            background-image:
                linear-gradient(var(--grid-color) 2px, transparent 2px),
                linear-gradient(90deg, var(--grid-color) 2px, transparent 2px);
            background-size: 30px 30px;
            mask-image: radial-gradient(ellipse at center, black 10%, transparent 75%);
            -webkit-mask-image: radial-gradient(ellipse at center, black 10%, transparent 75%);
            z-index: -1;
            opacity: 0;
            animation: fadeIn 2s ease forwards 1s;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .card {
            background-color: #ffffff;
            width: var(--card-width);
            height: var(--card-height);
            border-radius: 25px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            transform: scale(0);
            animation: cardAppear 1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        @keyframes cardAppear {
            to { transform: scale(1); }
        }

        /* --- INTERNAL CARD ELEMENTS --- */
        .rope-left, .rope-right {
            position: absolute;
            width: 50%;
            max-width: 180px;
            z-index: 10;
            opacity: 0;
            filter: blur(10px);
            animation: blurToClear 1s ease forwards 2s;
        }

        .rope-left { left: 0; top: 0; transform: translate(-30%, -30%) scaleX(-1); }
        .rope-right { right: 0; top: 0; transform: translate(30%, -30%); }

        .header-section {
            text-align: center;
            margin-top: 15%;
            padding: 0 15px;
            z-index: 5;
            width: 100%;
            box-sizing: border-box;
            opacity: 0;
            filter: blur(10px);
            animation: blurToClear 1s ease forwards 1.5s;
        }

        .subtitle-top {
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            font-size: 10px;
            letter-spacing: 2px;
            color: #111;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .title-main {
            font-family: 'Oswald', sans-serif;
            font-size: 48px;
            font-weight: 700;
            line-height: 1.1;
            margin: 0;
            color: #000;
            transform: scaleY(1.15);
        }

        .divider-container {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 10px 0;
            width: 100%;
            padding: 0 5%;
            box-sizing: border-box;
        }

        .line-wrapper {
            flex-grow: 1;
            height: 2px;
            background-color: #000;
        }

        .divider-text {
            font-family: 'Oswald', sans-serif;
            margin: 0 10px;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 2px;
            color: #000;
        }

        .subtitle-bottom {
            font-family: 'Montserrat', sans-serif;
            font-weight: 400;
            font-size: 10px;
            color: #888;
            margin-top: 5px;
        }

        .visual-section {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 55%;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        .outline-text-container {
            position: absolute;
            top: 0;
            width: 100%;
            text-align: center;
            z-index: 1;
            opacity: 0;
            filter: blur(10px);
            animation: blurToClear 1s ease forwards 1.8s;
        }

        .outline-text {
            font-family: 'Oswald', sans-serif;
            font-weight: 500;
            font-size: 80px;
            color: transparent;
            -webkit-text-stroke: 1px #d4d4d4;
            margin: 0;
            line-height: 0.9;
            letter-spacing: 2px;
        }

        .bottom-bg {
            position: absolute;
            bottom: 0;
            width: 90%;
            height: 30%;
            object-fit: cover;
            border-radius: 20px 20px 0 0;
            z-index: 2;
            opacity: 0;
            filter: blur(10px);
            animation: blurToClear 1s ease forwards 1s;
        }

        .person-image {
            position: absolute;
            bottom: 0;
            height: 100%;
            object-fit: contain;
            z-index: 3;
            transform: scale(1.2);
            opacity: 0;
            filter: blur(10px);
            animation: blurToClear 1s ease forwards 1.3s;
        }

        @keyframes blurToClear {
            to { opacity: 1; filter: blur(0); }
        }

    </style>
</head>
<body>

    <div class="bg-container">
        <div class="rect-moving">
            <div class="scrolling-text">
                <span>WEBSITE FLABS WORLD</span>
                <span>WEBSITE FLABS WORLD</span>
            </div>
        </div>
        <div class="crossed-container">
            <div class="box-3d box-1">
                <div class="scrolling-text">
                    <span>FLABS WORLD FLABS WORLD</span>
                    <span>FLABS WORLD FLABS WORLD</span>
                </div>
            </div>
            <div class="box-3d box-2">
                <div class="scrolling-text fast">
                    <span>WEBSITE WEBSITE</span>
                    <span>WEBSITE WEBSITE</span>
                </div>
            </div>
        </div>
    </div>

    <div class="card-wrapper">
        <div class="grid-shadow"></div>
        <div class="card">
        <img src="tali.png" alt="Tali" class="rope-left">
        <img src="tali.png" alt="Tali" class="rope-right">

        <div class="header-section">
            <div class="subtitle-top">GREAT PLACE TO SHOW OFF</div>
            <h1 class="title-main">PORTOFOLIO</h1>

            <div class="divider-container">
                <div class="line-wrapper"></div>
                <div class="divider-text">START</div>
                <div class="line-wrapper"></div>
            </div>

            <div class="subtitle-bottom">Amazing Gradient From Our Solar System</div>
        </div>

        <div class="visual-section">
            <div class="outline-text-container">
                <p class="outline-text">PORTO</p>
                <p class="outline-text">FOLIO</p>
            </div>

            <img src="background.png" alt="Background" class="bottom-bg">
            <img src="orang.png" alt="Gambar Orang" class="person-image">
        </div>
        </div>
    </div>

</body>
</html>
